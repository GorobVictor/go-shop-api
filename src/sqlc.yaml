version: "2"
servers:
- engine: postgresql
  uri: "postgres://shop_user:shop_password@localhost:5432/shop_db?sslmode=disable"
sql:
  - engine: "postgresql"
    queries: "proto/db/query.sql"
    schema: "proto/db/schema.sql"
    database:
      managed: true
    gen:
      go:
        out: "generated/db"
        sql_package: "pgx/v5"