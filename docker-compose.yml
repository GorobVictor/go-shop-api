services:
  shop-api:
    container_name: shop-api
    build:
      context: ./src
      dockerfile: Dockerfile
    image: shop-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://shop_user:shop_password@postgres:5432/shop_db?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shop_db
      DB_USER: shop_user
      DB_PASSWORD: shop_password
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: shop-api-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user -d shop_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
